<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OnePercent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 40%, #16213e 70%, #0f3460 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 60px 80px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 4px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 80px rgba(212, 175, 55, 0.08), inset 0 0 80px rgba(0,0,0,0.3);
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(212, 175, 55, 0.7);
      margin-bottom: 32px;
    }

    h1 {
      font-size: 52px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 2px;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    h1 span {
      color: #d4af37;
      font-style: italic;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
      margin: 0 auto 24px;
    }

    .subtitle {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow">OnePercent &mdash; Production Grade</p>
    <h1>Bain Capital,<br /><span>here I come.</span></h1>
    <div class="divider"></div>
    <p class="subtitle">AWS &nbsp;&bull;&nbsp; Kubernetes &nbsp;&bull;&nbsp; Terraform</p>
  </div>
</body>
</html>
