activeSlot: blue

blue:
  replicas: 1
  image:
    repository: 751545121618.dkr.ecr.us-east-1.amazonaws.com/app-repository
    tag: latest

green:
  replicas: 1
  image:
    repository: 751545121618.dkr.ecr.us-east-1.amazonaws.com/app-repository
    tag: latest

service:
  port: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 50

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
